services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: explorer
      POSTGRES_PASSWORD: explorer
      POSTGRES_DB: explorer
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U explorer -d explorer"]
      interval: 3s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
